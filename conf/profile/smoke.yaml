# @package _global_
# Fast local smoke test — same code path as `full`, tiny everything so an iteration
# takes seconds on a laptop. Reuses whatever lancedb is already collected (via
# dataset.max_episodes) instead of requiring a separate mini dataset.
defaults:
    - full
    - _self_

dataset:
    episodes: 5
    max_episode_steps: 50
    max_episodes: 20
training:
    vae:
        nb_epochs: 1
        batch_size: 8
    rnn:
        nb_epochs: 1
        precompute_batch_episodes: 4
controller:
    nb_rollouts: 2
    generations: 3
    popsize: 4
    max_steps: 50
    avg: 2
